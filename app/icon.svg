<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ink-deep rounded tile -->
  <rect width="64" height="64" rx="12" fill="#1F1D2C"/>

  <!-- subtle paper-rule above the letters -->
  <line x1="14" y1="20" x2="50" y2="20" stroke="#9A8E70" stroke-opacity="0.45" stroke-width="1"/>

  <!-- CA in a confident serif, italic for editorial flavour -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="'Times New Roman', Georgia, serif"
    font-size="34"
    font-weight="700"
    font-style="italic"
    fill="#F2EBDB"
    letter-spacing="-0.5"
  >CA</text>

  <!-- marker-red rule (the teacher's red pen) -->
  <rect x="14" y="50" width="36" height="3" rx="1.5" fill="#D4493B"/>
</svg>
